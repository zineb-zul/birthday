<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Omar ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 3em;
}

/* texte message surprise */
p {
  background-color: rgba(0,0,0,0.8); /* fond noir semi-transparent */
  color: red; /* texte visible */
  padding: 15px;
  border-radius: 10px;
  display: inline-block;
}

/* texte initial caché */
.hidden {
    opacity: 0;
}

/* animation texte */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.show {
    animation: fadeIn 2s forwards;
}

/* bouton */
button {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* ❤️ coeurs */
.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>
<body>

<div class="container">
    <h1>🎂 Happy Birthday My Love Omar ❤️</h1>
    <p id="surpriseText" class="hidden">
        I wish for you a life full of happiness, success and love 💖<br><br>
        May all your dreams come true ✨<br><br>
        Thank you for being in my life 🌍<br><br>
        I love you more than words can say ❤️
    </p>
    <br>
    <button onclick="startSurprise()">Clique ici 💖</button>
</div>

<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-piano-110997.mp3"></audio>

<script>
function startSurprise() {
    document.getElementById("music").play();

    const text = document.getElementById("surpriseText");
    text.classList.remove("hidden");
    text.classList.add("show");

    // ❤️ animation des coeurs
    setInterval(function () {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }, 300);
}
</script>

</body>
</html>
