<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Omar ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(120deg, #ff4e50, #fc913a);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 3em;
    animation: fadeIn 2s ease-in-out;
}

p {
    font-size: 1.5em;
    margin-top: 20px;
    animation: fadeIn 4s ease-in-out;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4e50;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* 🎈 Balloons */
.balloon {
    position: absolute;
    bottom: -150px;
    width: 50px;
    height: 70px;
    background: red;
    border-radius: 50%;
    animation: float 6s infinite ease-in;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}

/* ❤️ cœur animation */
.heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    0% {transform: translateY(-10vh);}
    100% {transform: translateY(110vh);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Happy Birthday Omar ❤️</h1>
    <p>Tu es la plus belle chose dans ma vie 💖</p>
    <button onclick="startSurprise()">Clique ici 🎁</button>
</div>

<!-- 🎵 musique -->
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
function startSurprise() {
    document.querySelector(".container").innerHTML = `
        <h1>Je t’aime Omar ❤️</h1>
        <p>Que cette année soit pleine de bonheur 💕</p>
        <p>Tu es mon monde 🌍</p>
    `;

    document.getElementById("music").play();

    // 🎈 balloons
    for (let i = 0; i < 10; i++) {
        let b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * 100 + "vw";
        b.style.background = ["red","pink","yellow","blue"][Math.floor(Math.random()*4)];
        document.body.appendChild(b);
    }

    // ❤️ hearts
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 300);
}
</script>

</body>
</html>
