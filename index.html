<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Omar ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

h1 {
    font-size: 3em;
    animation: fadeIn 2s ease-in-out;
}

p {
    font-size: 1.4em;
    margin-top: 20px;
    line-height: 1.6;
    animation: fadeIn 3s ease-in-out;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* animation texte */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ❤️ coeurs */
.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎂 Happy Birthday My Love Omar ❤️</h1>
    <p>J’ai une petite surprise pour toi...</p>
    <button onclick="startSurprise()">Clique ici 💖</button>
</div>

<!-- 🎵 musique romantique -->
<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-piano-110997.mp3"></audio>

<script>
function startSurprise() {
    const container = document.querySelector(".container");

    container.innerHTML =
        "<h1>Happy Birthday My Love Omar ❤️</h1>" +
        "<p>" +
        "I wish for you a life full of happiness, success and love 💖<br><br>" +
        "May all your dreams come true ✨<br><br>" +
        "Thank you for being in my life 🌍<br><br>" +
        "I love you more than words can say ❤️" +
        "</p>";

    document.getElementById("music").play();

    // ❤️ animation
    setInterval(function () {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(function () {
            heart.remove();
        }, 6000);
    }, 300);
}
</script>

</body>
</html>
